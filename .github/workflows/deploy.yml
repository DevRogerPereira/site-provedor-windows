name: Deploy via ftp
on: push
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    # O FTP do Windows/IIS da Locaweb da erro 550 transitorio (arquivo em uso por
    # outro processo). Tentamos ate 3x, com pausa pro lock liberar.
    - name: FTP Deploy (tentativa 1)
      id: ftp1
      continue-on-error: true
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        password: ${{ secrets.PASS }}
        server-dir: "web/"
        local-dir: "./"

    - name: Aguarda lock liberar
      if: steps.ftp1.outcome == 'failure'
      run: sleep 45

    - name: FTP Deploy (tentativa 2)
      id: ftp2
      if: steps.ftp1.outcome == 'failure'
      continue-on-error: true
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        password: ${{ secrets.PASS }}
        server-dir: "web/"
        local-dir: "./"

    - name: Aguarda lock liberar (2)
      if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
      run: sleep 90

    - name: FTP Deploy (tentativa 3)
      if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        password: ${{ secrets.PASS }}
        server-dir: "web/"
        local-dir: "./"

    - name: Clear PHP cache (OPcache/APCu)
      shell: bash
      run: |
        set -u
        if ! command -v curl >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y curl
        fi

        HOST_RAW="${{ secrets.HOST }}"

        # Normaliza o valor do secret:
        # - aceita tanto "dominio.com" quanto "https://dominio.com"
        # - remove barra final
        HOST_NO_PROTO="${HOST_RAW#http://}"
        HOST_NO_PROTO="${HOST_NO_PROTO#https://}"
        HOST_NO_PROTO="${HOST_NO_PROTO%/}"

        # Token do reset.php (deve bater com $TOKEN dentro de reset.php)
        RESET_TOKEN="Rst7Emf844888xQ2"

        # Monta tentativas comuns considerando que o FTP deposita em "web/" e pode variar na URL pública.
        urls=(
          "https://${HOST_NO_PROTO}/reset.php?token=${RESET_TOKEN}"
          "http://${HOST_NO_PROTO}/reset.php?token=${RESET_TOKEN}"
          "https://${HOST_NO_PROTO}/web/reset.php?token=${RESET_TOKEN}"
          "http://${HOST_NO_PROTO}/web/reset.php?token=${RESET_TOKEN}"
        )

        echo "Limpando cache via reset.php..."
        success=0

        for url in "${urls[@]}"; do
          echo "Tentando: $url"
          http_code="$(curl -k -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")"
          echo "HTTP_CODE: $http_code"
          if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 400 ] 2>/dev/null; then
            success=1
            break
          fi
        done

        if [ "$success" -eq 1 ]; then
          echo "Cache limpo com sucesso."
        else
          echo "Aviso: não foi possível limpar cache via reset.php (nenhuma URL retornou 200)."
          echo "O deploy do site continua normalmente."
          exit 0
        fi
