name: Deploy via ftp
on: push
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.HOST }} 
        username: ${{ secrets.USER }}
        password: ${{ secrets.PASS }}
        server-dir: "web/"
        local-dir: "./"
