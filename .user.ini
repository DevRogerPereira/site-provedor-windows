display_errors = Off
display_startup_errors = Off
zlib.output_compression = On
zlib.output_compression_level = 6
output_buffering = 4096
max_execution_time = 30
memory_limit = 128M

; Cache de realpath maior: menos idas ao disco lento compartilhado para resolver includes
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; OPcache — compila o PHP uma vez em vez de a cada request (grande alivio de CPU no
; ambiente compartilhado). Estas diretivas so tem efeito se a extensao OPcache estiver
; carregada no handler PHP; se nao estiver, sao simplesmente ignoradas (nao quebram nada).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 6000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.save_comments = 1
